<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>支付成功 | 微信号购买账号资料交付 - 微信小号自助购买平台</title>
    <meta name="description" content="微信号购买支付成功页面，展示实名微信号、微信小号、海外微信号等订单信息、支付状态、交易哈希和账号资料交付内容，支持复制资料与返回订单详情。" />
    <meta name="keywords" content="微信号支付成功,微信号账号资料,微信号自动发货,微信号订单交付,实名微信号购买成功" />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://shumaojs.com/success/" />
    <meta property="og:title" content="微信号购买支付成功 - 账号资料交付" />
    <meta property="og:description" content="支付成功后展示微信号订单信息、支付状态和账号资料交付内容。" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="assets/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="数贸集市首页">
        <img class="brand-logo" src="assets/logo.svg" alt="" />
        <span>数贸集市</span>
      </a>
      <nav class="nav">
        <a href="./#products">商品</a>
        <a href="query/">邮箱查询</a>
        <a href="./#notice">购买须知</a> 
      </nav>
    </header>

    <main class="success-page">
      <section class="success-shell" id="successShell">
        <div class="success-head">
          <p class="section-kicker">支付成功</p>
          <h1>账号资料已生成</h1>
          <p>请及时复制并保存账号资料，也可以通过订单号或邮箱在查询页再次查看。</p>
        </div>

        <div class="order-detail-grid">
          <section class="detail-card">
            <h2>订单信息</h2>
            <dl class="detail-list">
              <div>
                <dt>订单编号</dt>
                <dd id="successOrderNo">--</dd>
              </div>
              <div>
                <dt>商品名称</dt>
                <dd id="successProduct">--</dd>
              </div>
              <div>
                <dt>接收邮箱</dt>
                <dd id="successEmail">--</dd>
              </div>
              <div>
                <dt>订单金额</dt>
                <dd id="successAmount">--</dd>
              </div>
            </dl>
          </section>

          <section class="detail-card">
            <h2>支付状态</h2>
            <dl class="detail-list">
              <div>
                <dt>状态</dt>
                <dd id="successStatus">--</dd>
              </div>
              <div>
                <dt>支付网络</dt>
                <dd id="successNetwork">--</dd>
              </div>
              <div>
                <dt>支付时间</dt>
                <dd id="successPaidAt">--</dd>
              </div>
              <div>
                <dt>交易哈希</dt>
                <dd id="successTxHash">--</dd>
              </div>
            </dl>
          </section>
        </div>

        <section class="delivery-card">
          <div class="delivery-head">
            <div>
              <p class="section-kicker">账号资料</p>
              <h2>交付内容</h2>
            </div>
            <button class="copy-button copy-delivery" type="button" id="copySuccessDelivery">复制资料</button>
          </div>
          <p class="delivery-format">发货格式：手机号 - 密码 - 短信验证码接收链接 - 登录教程</p>
          <pre class="delivery-box" id="successDelivery">正在读取订单资料...</pre>
        </section>

        <div class="success-actions">
          <a class="query-link" id="successDetailLink" href="query/" target="_blank" rel="noopener">查看订单详情</a>
          <a class="query-link" href="query/" target="_blank" rel="noopener">查询订单</a>
          <a class="ghost-button" href="./#products" target="_blank" rel="noopener">继续购买</a>
        </div>
      </section>

      <section class="empty-state order-not-found" id="successNotFound" hidden>
        <span class="empty-icon">?</span>
        <h3>未找到订单</h3>
        <p>请返回查询页输入订单号或邮箱重新查询。</p>
        <a class="query-link" href="query/" target="_blank" rel="noopener">返回查询</a>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 数贸集市</span>
      <span>虚拟商品 · USDT 支付 · 邮箱交付</span>
    </footer>

    <script src="supabase-config.js"></script>
    <script src="supabase-orders.js"></script>
    <script src="success.js"></script>
  </body>
</html>
